<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>✨ 网页版AI · 智能助手</title>
    <!-- 字体与基础样式 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <!-- Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 代码高亮主题 (GitHub Dark) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <!-- 轻量动画 & 基础样式 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #f9fafc;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            color: #1e1f2a;
        }
        .chat-wrapper {
            width: 100%;
            max-width: 880px;
            height: 90vh;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(226, 232, 240, 0.6);
            backdrop-filter: blur(2px);
            transition: all 0.2s;
        }
        /* 头部 */
        .chat-header {
            padding: 18px 24px;
            border-bottom: 1px solid #edf2f7;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffffdd;
            backdrop-filter: blur(8px);
        }
        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-title i {
            font-size: 1.8rem;
            color: #3b82f6;
            background: #eef2ff;
            padding: 8px;
            border-radius: 16px;
        }
        .header-title h1 {
            font-weight: 600;
            font-size: 1.5rem;
            letter-spacing: -0.02em;
            color: #0f172a;
        }
        .badge {
            background: #e6edfb;
            color: #2563eb;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-left: 8px;
            border: 1px solid #bfdbfe;
        }
        .btn-clear {
            background: none;
            border: none;
            color: #64748b;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 10px 12px;
            border-radius: 40px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .btn-clear:hover {
            background: #f1f5f9;
            color: #0f172a;
        }
        /* 聊天主体 */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 20px 10px 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
            background: #fbfdff;
        }
        /* 消息气泡 */
        .message-row {
            display: flex;
            width: 100%;
        }
        .message-row.user {
            justify-content: flex-end;
        }
        .message-row.assistant {
            justify-content: flex-start;
        }
        .message-bubble {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 24px;
            line-height: 1.6;
            font-size: 0.95rem;
            word-wrap: break-word;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        .user .message-bubble {
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 6px;
            border: 1px solid #2563eb30;
        }
        .assistant .message-bubble {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 6px;
            color: #1e293b;
            box-shadow: 0 4px 8px -4px rgba(0,0,0,0.04);
        }
        /* 用户消息中的链接颜色 */
        .user .message-bubble a {
            color: #ffec9e;
            text-decoration: underline;
        }
        /* 助手消息内 markdown 样式 */
        .assistant .message-bubble pre {
            background: #0d1117;
            padding: 16px;
            border-radius: 16px;
            overflow-x: auto;
            margin: 12px 0;
            font-size: 0.85rem;
            border: 1px solid #30363d;
        }
        .assistant .message-bubble code {
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace;
            font-size: 0.9em;
        }
        .assistant .message-bubble p {
            margin-bottom: 0.8em;
        }
        .assistant .message-bubble p:last-child {
            margin-bottom: 0;
        }
        .assistant .message-bubble ul, .assistant .message-bubble ol {
            margin-left: 1.5em;
            margin-bottom: 0.8em;
        }
        .assistant .message-bubble h1, .assistant .message-bubble h2, .assistant .message-bubble h3 {
            margin-top: 1.2em;
            margin-bottom: 0.6em;
            font-weight: 600;
        }
        /* 加载指示器 */
        .loading-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 18px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            border-bottom-left-radius: 6px;
            width: fit-content;
            color: #475569;
        }
        .dot-flashing {
            display: flex;
            gap: 5px;
        }
        .dot-flashing span {
            width: 8px;
            height: 8px;
            background: #94a3b8;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot-flashing span:nth-child(1) { animation-delay: -0.32s; }
        .dot-flashing span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1.2); opacity: 1; }
        }
        /* 输入区域 */
        .chat-input-area {
            padding: 18px 24px 22px;
            background: #ffffff;
            border-top: 1px solid #eef2f6;
        }
        .input-container {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            background: #f8fafc;
            border-radius: 32px;
            padding: 8px 10px 8px 20px;
            border: 1px solid #e2e8f0;
            transition: border 0.15s, box-shadow 0.15s;
        }
        .input-container:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px #3b82f620;
            background: #ffffff;
        }
        .chat-input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px 0;
            font-size: 0.95rem;
            resize: none;
            outline: none;
            font-family: 'Inter', sans-serif;
            max-height: 150px;
            line-height: 1.5;
        }
        .send-btn {
            background: #3b82f6;
            border: none;
            color: white;
            width: 46px;
            height: 46px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.15s;
            font-size: 1.2rem;
            box-shadow: 0 6px 14px #3b82f660;
            flex-shrink: 0;
        }
        .send-btn:hover {
            background: #2563eb;
            transform: scale(1.02);
        }
        .send-btn:disabled {
            background: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
        .example-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }
        .chip {
            background: #f1f5f9;
            color: #1e293b;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.1s;
            font-weight: 500;
        }
        .chip i {
            margin-right: 6px;
            font-size: 0.7rem;
            color: #3b82f6;
        }
        .chip:hover {
            background: #e2e8f0;
            border-color: #cbd5e1;
        }
        /* 滚动条美化 */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 20px;
        }
        /* 脚注 */
        .footer-note {
            font-size: 0.7rem;
            text-align: center;
            color: #94a3b8;
            margin-top: 4px;
        }
    </style>
</head>
<body>
<div class="chat-wrapper">
    <!-- 头部 -->
    <div class="chat-header">
        <div class="header-title">
            <i class="fas fa-robot"></i>
            <h1>Web AI <span class="badge">免费 · 极速</span></h1>
        </div>
        <button class="btn-clear" id="clearChatBtn" title="清空对话">
            <i class="fas fa-trash-alt"></i> 清空
        </button>
    </div>

    <!-- 消息区域 -->
    <div class="chat-messages" id="chatMessages"></div>

    <!-- 输入区域 -->
    <div class="chat-input-area">
        <div class="input-container">
            <textarea class="chat-input" id="chatInput" placeholder="输入消息… (Shift+Enter 换行)" rows="1"></textarea>
            <button class="send-btn" id="sendBtn" aria-label="发送"><i class="fas fa-paper-plane"></i></button>
        </div>
        <!-- 示例快捷问题 -->
        <div class="example-chips">
            <div class="chip" data-prompt="用Python写一个快速排序"><i class="fas fa-code"></i> Python快速排序</div>
            <div class="chip" data-prompt="解释什么是RESTful API"><i class="fas fa-globe"></i> 解释RESTful API</div>
            <div class="chip" data-prompt="给我讲一个简短的笑话"><i class="fas fa-face-smile"></i> 讲个笑话</div>
            <div class="chip" data-prompt="用JavaScript写一个防抖函数"><i class="fas fa-terminal"></i> JS防抖</div>
        </div>
        <div class="footer-note">
            <i class="fas fa-bolt"></i> 由 Pollinations.ai 提供支持 · 完全免费
        </div>
    </div>
</div>

<!-- 依赖库: marked (Markdown解析) + highlight.js (代码高亮) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<!-- 额外语言支持 (常用) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/typescript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>

<script>
    (function(){
        "use strict";

        // ---------- 配置 ----------
        const API_URL = 'https://text.pollinations.ai/';  // 免费、无密钥
        // 系统提示词 (让AI更贴合编程助手风格)
        const SYSTEM_PROMPT = {
            role: 'system',
            content: '你是一个智能、友善的AI助手，擅长编程、技术答疑和创意写作。请用清晰、准确的中文回答，代码使用Markdown格式并适当注释。'
        };

        // DOM 元素
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearChatBtn');

        // 状态管理
        let messages = [];                // 存储完整对话 (包含system, user, assistant)
        let isLoading = false;
        let abortController = null;       // 用于取消请求

        // ---------- 初始化 ----------
        function initChat() {
            // 欢迎消息 & 系统消息 (system不显示，但参与上下文)
            messages.push({ ...SYSTEM_PROMPT });
            // 添加一条助手欢迎语
            messages.push({
                role: 'assistant',
                content: '👋 你好！我是网页版AI助手。我可以帮你写代码、解释概念、回答问题。直接提问或点击下方标签试试吧！'
            });
            renderMessages();
        }

        // ---------- 渲染消息 (过滤掉system) ----------
        function renderMessages() {
            if (!chatMessages) return;
            
            // 过滤掉 system 角色，只显示 user 和 assistant
            const displayMessages = messages.filter(m => m.role !== 'system');
            
            let html = '';
            displayMessages.forEach((msg, index) => {
                const isUser = msg.role === 'user';
                const content = msg.content || '';
                
                if (isUser) {
                    // 用户消息：转义HTML，保留换行
                    const escaped = escapeHtml(content).replace(/\n/g, '<br>');
                    html += `
                        <div class="message-row user">
                            <div class="message-bubble">${escaped}</div>
                        </div>
                    `;
                } else {
                    // 助手消息：使用 marked 解析 Markdown
                    let renderedContent = '';
                    try {
                        // 配置 marked
                        marked.setOptions({
                            breaks: true,
                            gfm: true,
                        });
                        renderedContent = marked.parse(content);
                    } catch (e) {
                        console.warn('Markdown解析失败，回退纯文本', e);
                        renderedContent = escapeHtml(content).replace(/\n/g, '<br>');
                    }
                    html += `
                        <div class="message-row assistant">
                            <div class="message-bubble">${renderedContent}</div>
                        </div>
                    `;
                }
            });

            // 如果正在加载，显示加载动画 (作为临时指示器，不存入messages)
            if (isLoading) {
                html += `
                    <div class="message-row assistant">
                        <div class="loading-indicator">
                            <span>AI 思考中</span>
                            <div class="dot-flashing">
                                <span></span><span></span><span></span>
                            </div>
                        </div>
                    </div>
                `;
            }

            chatMessages.innerHTML = html;
            
            // 对助手消息中的代码块进行高亮
            if (!isLoading) {
                requestAnimationFrame(() => {
                    const codeBlocks = chatMessages.querySelectorAll('.assistant .message-bubble pre code');
                    codeBlocks.forEach(block => {
                        hljs.highlightElement(block);
                    });
                });
            }
            
            // 滚动到底部
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // 简单的转义函数
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // ---------- 发送消息到 AI ----------
        async function sendMessage(userContent) {
            if (isLoading) return;
            const trimmed = userContent.trim();
            if (!trimmed) return;

            // 添加用户消息
            messages.push({ role: 'user', content: trimmed });
            renderMessages();
            
            // 清空输入框，调整高度
            chatInput.value = '';
            autoResizeTextarea(chatInput);
            
            // 开启加载状态
            isLoading = true;
            sendBtn.disabled = true;
            chatInput.disabled = true;
            renderMessages();  // 显示加载动画

            // 准备 AbortController 用于超时/取消 (30秒超时)
            abortController = new AbortController();
            const timeoutId = setTimeout(() => abortController.abort(), 30000);

            try {
                // 构造请求体: 使用 messages 格式 (包含system, user, assistant)
                const requestMessages = messages.map(m => ({ role: m.role, content: m.content }));
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: requestMessages,
                        model: 'openai',        // 稳定模型
                        temperature: 0.7,
                        // 可加 seed 等，但不必
                    }),
                    signal: abortController.signal,
                });

                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    throw new Error(`API 响应错误: ${response.status} ${response.statusText}`);
                }

                const aiText = await response.text();
                const cleanText = aiText.trim() || "（AI 返回了空内容，请重试）";
                
                // 添加助手回复
                messages.push({ role: 'assistant', content: cleanText });
                
            } catch (error) {
                console.error('请求失败:', error);
                let errorMsg = '';
                if (error.name === 'AbortError') {
                    errorMsg = '⏰ 请求超时，请稍后再试。';
                } else {
                    errorMsg = `❌ 出错了: ${error.message || '未知错误'}`;
                }
                messages.push({ role: 'assistant', content: errorMsg });
            } finally {
                // 清理状态
                isLoading = false;
                sendBtn.disabled = false;
                chatInput.disabled = false;
                abortController = null;
                renderMessages();
                chatInput.focus();
            }
        }

        // ---------- 清空对话 (保留系统提示，重置欢迎语) ----------
        function resetConversation() {
            if (isLoading) {
                // 如果正在加载，尝试取消请求
                if (abortController) {
                    abortController.abort();
                }
                isLoading = false;
                sendBtn.disabled = false;
                chatInput.disabled = false;
            }
            // 重置消息数组
            messages = [];
            messages.push({ ...SYSTEM_PROMPT });
            messages.push({
                role: 'assistant',
                content: '🧹 对话已清空。有什么我可以帮你的吗？'
            });
            renderMessages();
        }

        // ---------- 辅助: 自动调整textarea高度 ----------
        function autoResizeTextarea(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
        }

        // ---------- 事件绑定 ----------
        function bindEvents() {
            // 发送按钮
            sendBtn.addEventListener('click', () => {
                const content = chatInput.value.trim();
                if (content) sendMessage(content);
            });

            // 输入框键盘事件
            chatInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    const content = chatInput.value.trim();
                    if (content) sendMessage(content);
                }
            });

            // 自动调整高度
            chatInput.addEventListener('input', () => autoResizeTextarea(chatInput));

            // 清空按钮
            clearBtn.addEventListener('click', resetConversation);

            // 示例标签点击
            document.querySelectorAll('.chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    const prompt = chip.getAttribute('data-prompt');
                    if (prompt) {
                        chatInput.value = prompt;
                        autoResizeTextarea(chatInput);
                        chatInput.focus();
                        // 可选自动发送？但为了体验，不自动发送，让用户决定
                    }
                });
            });
        }

        // 启动一切
        initChat();
        bindEvents();
        // 初始聚焦
        chatInput.focus();

        // 暴露一些全局（调试可选）
        window.chatState = { messages, isLoading };
    })();
</script>
</body>
</html>
