<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>不重叠随机文字滚动</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    background: #000;
    min-height: 100vh;
    overflow: hidden;
  }

  .text-item {
    position: absolute;
    color: #ffd700;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    animation: fadeIn 1s ease forwards, scroll linear infinite;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  @keyframes scroll {
    0% { transform: translateX(100vw); }
    100% { transform: translateX(-120%); }
  }
</style>
</head>
<body>

<script>
const text = "这里换成你要滚动的文字";
const count = 12; // 数量，不要太大就不会挤
const usedY = [];
const step = 8; // 垂直间距，越大越不重叠

// 生成不重叠的Y位置
function getSafeY() {
  let y;
  do {
    y = Math.floor(Math.random() * 100);
  } while (usedY.some(vy => Math.abs(vy - y) < step));
  usedY.push(y);
  return y;
}

for (let i = 0; i < count; i++) {
  const el = document.createElement('div');
  el.className = 'text-item';
  el.innerText = text;

  const y = getSafeY();
  const size = 18 + Math.random() * 24;
  const speed = 10 + Math.random() * 14;
  const delay = Math.random() * 8;

  el.style.top = y + '%';
  el.style.fontSize = size + 'px';
  el.style.animationDelay = `${delay}s, ${delay}s`;
  el.style.animationDuration = `1s, ${speed}s`;

  document.body.appendChild(el);
}
</script>

</html>
