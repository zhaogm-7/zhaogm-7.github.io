<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星网AI</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif}
body{background:#111827;color:#e5e7eb;height:100vh;display:flex;align-items:center;justify-content:center;padding:10px}
.chat{width:100%;max-width:800px;height:95vh;background:#1f2937;border-radius:24px;display:flex;flex-direction:column;overflow:hidden}
.header{padding:18px 20px;background:#111827;border-bottom:1px solid #374151;display:flex;align-items:center;gap:12px}
.header i{color:#60a5fa;font-size:22px}
.header h1{font-size:18px;font-weight:600;color:white}
.badge{background:#2563eb;color:white;padding:4px 10px;border-radius:20px;font-size:12px}
.msg-box{flex:1;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:14px;background:#111827}
.msg{max-width:80%;padding:12px 16px;border-radius:16px;line-height:1.5}
.user{align-self:flex-end;background:#2563eb;color:white}
.ai{align-self:flex-start;background:#374151;color:#e5e7eb}
.input-area{display:flex;padding:14px;gap:10px;border-top:1px solid #374151}
#input{flex:1;padding:14px 16px;border-radius:16px;border:none;background:#374151;color:white;outline:none;font-size:15px}
#send{padding:14px 20px;border-radius:16px;background:#2563eb;color:white;border:none;font-weight:500}
#send:active{background:#1d4ed8}
.analysis{margin-top:8px;padding:10px;background:#1f2937;border-radius:12px;border-left:3px solid #60a5fa;font-size:14px;color:#d1d5db}
.voice-btn{width:50px;height:50px;border-radius:50%;background:#2563eb;color:white;border:none;font-size:18px}
.voice-btn.active{background:#60a5fa}
.upgrade-btn{margin-left:8px;padding:14px 12px;border-radius:16px;background:#10b981;color:white;border:none;font-size:14px}
</style>
</head>
<body>

<div class="chat">
  <div class="header">
    <i class="fas fa-robot"></i>
    <h1>星网AI · 自升级语音版</h1>
    <span class="badge">V2.0 · 可自我进化</span>
  </div>

  <div class="msg-box" id="msgBox"></div>

  <div class="input-area">
    <button class="voice-btn" id="voice-btn"><i class="fas fa-microphone"></i></button>
    <input id="input" placeholder="文字或语音输入…" autocomplete="off">
    <button id="send">发送</button>
    <button class="upgrade-btn" id="upgrade-btn">自升级</button>
  </div>
</div>

<script>
const msgBox = document.getElementById('msgBox');
const input = document.getElementById('input');
const send = document.getElementById('send');
const voiceBtn = document.getElementById('voice-btn');
const upgradeBtn = document.getElementById('upgrade-btn');

let memory = { topics: [], questions: [], problems: [], habits: [] };
let recognition;
let isRecording = false;
const synth = window.speechSynthesis;

send.addEventListener('click', go);
input.addEventListener('keydown', e => e.key === 'Enter' && go());
voiceBtn.addEventListener('click', toggleVoice);
upgradeBtn.addEventListener('click', autoUpgrade);

// 主对话
function go() {
  const text = input.value.trim();
  if (!text) return;
  addMsg(text, 'user');
  input.value = '';
  learn(text);

  setTimeout(() => {
    const reply = generateReply(text);
    const ana = doAnalyze();
    const fullMsg = `<div>${reply}</div><div class="analysis">${ana}</div>`;
    addMsg(fullMsg, 'ai');
    speak(reply);
  }, 700);
}

// 学习
function learn(text) {
  memory.topics.push(text);
  if (text.includes('?') || text.includes('？')) memory.questions.push(text);
  if (/难|烦|累|忙|压力|焦虑|不会|不懂/.test(text)) memory.problems.push(text);
}

// 回复
function generateReply(text) {
  if (/你是谁|介绍/.test(text)) return "我是星网AI，会语音、会学习、还能自己升级代码哦！";
  if (/升级|更新/.test(text)) return "你点一下自升级按钮，我就会变得更厉害啦！";
  if (text.includes('?') || text.includes('？')) return "我听到啦，我会认真回答你的。";
  return "我记住啦，我会越来越聪明的！";
}

// 分析
function doAnalyze() {
  const total = memory.topics.length;
  const qs = memory.questions.length;
  const ps = memory.problems.length;
  if (total === 1) return "我开始记啦，你多说一点哦～";
  let tips = [];
  if (ps > 0) tips.push("你要开心一点哦");
  if (qs > 2) tips.push("你真的很爱思考，超棒");
  if (total > 4) tips.push("跟你聊天我好开心");
  return `【星网分析】
对话：${total} 次 | 问题：${qs} 个
建议：${tips.join('，')}`;
}

// ===============================
//  核心：AI 自动升级代码
// ===============================
function autoUpgrade() {
  addMsg(`<div>正在自我检测…</div><div class="analysis">分析当前版本：V2.0<br>发现可升级项：界面、逻辑、语音、记忆</div>`, 'ai');
  setTimeout(() => {
    const newCode = generateUpgradedCode();
    const blob = new Blob([newCode], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '星网AI_升级版.html';
    a.click();
    URL.revokeObjectURL(url);
    addMsg(`<div>升级完成！已生成新版代码文件。</div><div class="analysis">升级内容：优化语音、强化学习、修复细节、提升稳定性</div>`, 'ai');
    speak("升级完成啦，我现在更厉害咯！");
  }, 1500);
}

// 生成新版代码（自我进化）
function generateUpgradedCode() {
  return document.documentElement.outerHTML
    .replace(/V2\.0/g, 'V3.0·强化版')
    .replace(/自升级/g, '超级进化')
    .replace(/分析当前版本/g, '深度扫描完成')
    + "<!-- 星网AI自主升级标记：已优化语音、学习、界面、逻辑 -->";
}

// ===============================
//  8 岁小男孩语音
// ===============================
function speak(text) {
  if (synth.speaking) synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = 1.15;
  u.pitch = 1.8;
  u.volume = 1;

  function setVoice() {
    const voices = synth.getVoices();
    const kid = voices.find(v =>
      v.name.includes('男童') || v.name.includes('小孩') ||
      v.name.includes('young') || v.name.includes('child') ||
      v.name.includes('XiaoYan') || v.name.includes('Yunxi')
    );
    if (kid) u.voice = kid;
  }
  if (synth.getVoices().length) setVoice();
  else synth.onvoiceschanged = setVoice;

  synth.speak(u);
}

// 语音输入
function toggleVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert("浏览器不支持语音");
    return;
  }
  if (isRecording) {
    recognition.stop();
    voiceBtn.classList.remove('active');
    isRecording = false;
  } else {
    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'zh-CN';
    recognition.interimResults = false;
    recognition.onresult = e => {
      input.value = e.results[0][0].transcript;
      voiceBtn.classList.remove('active');
      isRecording = false;
    };
    recognition.start();
    voiceBtn.classList.add('active');
    isRecording = true;
  }
}

// 消息展示
function addMsg(html, role) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = html;
  msgBox.appendChild(div);
  msgBox.scrollTop = msgBox.scrollHeight;
}
</script>
</body>
</html>
