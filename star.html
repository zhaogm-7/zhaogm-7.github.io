<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>星网AI - 深空终端</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Roboto, system-ui, -apple-system;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: #050a1a;
      color: #e0f7ff;
    }

    /* 启动动画 */
    .boot {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #050a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 9999;
      color: #5ad1ff;
      font-size: 16px;
      gap: 10px;
      animation: bootHide 0.6s ease forwards 1.6s;
    }
    @keyframes bootHide {
      to { opacity: 0; visibility: hidden; }
    }
    .boot-text {
      opacity: 0;
      animation: textShow 0.6s ease forwards;
    }
    .boot-text:nth-child(1) { animation-delay: 0.1s; }
    .boot-text:nth-child(2) { animation-delay: 0.6s; }
    .boot-text:nth-child(3) { animation-delay: 1.1s; }
    @keyframes textShow {
      to { opacity: 1; }
    }

    /* 深空背景 */
    .space-bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top center, #0c1a36, #050a1a);
      z-index: -3;
    }

    /* 流动星空 */
    .stars {
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1.5px 1.5px at 20% 30%, #c0f8ff, transparent),
        radial-gradient(1.5px 1.5px at 60% 70%, #9ceeff, transparent),
        radial-gradient(1px 1px at 50% 50%, #5ad1ff, transparent),
        radial-gradient(2px 2px at 10% 10%, #70a0ff, transparent);
      background-size: 220px 220px;
      opacity: 0.6;
      z-index: -2;
      animation: starMove 15s linear infinite;
    }

    @keyframes starMove {
      0% { transform: translateY(0); }
      100% { transform: translateY(-220px); }
    }

    /* 主窗口 */
    .star-window {
      width: 100%;
      max-width: 820px;
      height: 95vh;
      margin: 2.5vh auto;
      background: rgba(12, 22, 44, 0.85);
      border-radius: 18px;
      border: 1px solid rgba(90, 209, 255, 0.22);
      box-shadow: 0 0 50px rgba(90, 209, 255, 0.12);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      z-index: 10;
    }

    /* 头部 */
    .star-header {
      padding: 18px 22px;
      background: rgba(9, 16, 32, 0.96);
      border-bottom: 1px solid rgba(90, 209, 255, 0.18);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .star-header i {
      color: #5ad1ff;
      font-size: 20px;
    }

    .star-header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #e0f7ff;
    }

    /* 右上角系统状态 */
    .status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #a0c8ff;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      background: #5ad1ff;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100%{opacity:.4;}50%{opacity:1;}
    }

    /* 消息区域 */
    .msg-box {
      flex: 1;
      padding: 22px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      max-width: 76%;
      padding: 12px 16px;
      border-radius: 13px;
      font-size: 15px;
      line-height: 1.5;
      opacity: 0;
      transform: translateY(6px);
      animation: msgIn 0.25s forwards;
    }

    @keyframes msgIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      align-self: flex-end;
      background: linear-gradient(90deg, #2d7dff, #5ad1ff);
      color: #fff;
      border-bottom-right-radius: 5px;
    }

    .msg.ai {
      align-self: flex-start;
      background: rgba(18, 30, 54, 0.7);
      color: #e0f7ff;
      border: 1px solid rgba(90, 209, 255, 0.18);
      border-bottom-left-radius: 5px;
    }

    /* 正在输入 */
    .typing {
      display: flex;
      gap: 6px;
      padding: 11px 15px;
      background: rgba(18, 30, 54, 0.7);
      border-radius: 13px;
      align-self: flex-start;
      border: 1px solid rgba(90, 209, 255, 0.18);
    }

    .typing span {
      width: 7px;
      height: 7px;
      background: #5ad1ff;
      border-radius: 50%;
      animation: jump 1.2s infinite ease-in-out;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes jump {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    /* 发送框：透明通透，能看见星空 */
    .input-bar {
      display: flex;
      gap: 10px;
      padding: 16px;
      background: transparent !important; /* 完全透明 */
      border-top: 1px solid rgba(90, 209, 255, 0.15);
    }

    .voice-btn {
      width: 50px;
      height: 50px;
      border-radius: 13px;
      background: rgba(18, 30, 54, 0.35);
      border: 1px solid rgba(90, 209, 255, 0.3);
      color: #5ad1ff;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
    }

    .voice-btn:hover {
      background: rgba(90, 209, 255, 0.1);
    }

    #input {
      flex: 1;
      padding: 14px 18px;
      border-radius: 13px;
      border: 1px solid rgba(90, 209, 255, 0.3);
      background: rgba(15, 26, 48, 0.35); /* 透明，看见背景 */
      color: #e0f7ff;
      font-size: 15px;
      outline: none;
      transition: 0.2s;
    }

    #input:focus {
      border-color: rgba(90, 209, 255, 0.6);
      background: rgba(15, 26, 48, 0.45);
    }

    #send {
      padding: 14px 24px;
      border-radius: 13px;
      background: linear-gradient(90deg, #2d7dff, #5ad1ff);
      color: #fff;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    #send:hover {
      opacity: 0.92;
    }

    /* 滚动条 */
    .msg-box::-webkit-scrollbar {
      width: 6px;
    }

    .msg-box::-webkit-scrollbar-thumb {
      background: rgba(90, 209, 255, 0.25);
      border-radius: 3px;
    }
  </style>
</head>
<body>

<!-- 星网启动动画 -->
<div class="boot">
  <div class="boot-text">星网系统启动中…</div>
  <div class="boot-text">神经链路同步…</div>
  <div class="boot-text">连接成功</div>
</div>

<div class="space-bg"></div>
<div class="stars"></div>

<div class="star-window">
  <div class="star-header">
    <i class="fas fa-satellite"></i>
    <h1>星网AI 深空终端</h1>
    <div class="status">
      <div class="status-dot"></div>
      <span>系统已连接</span>
    </div>
  </div>

  <div class="msg-box" id="msgBox"></div>

  <div class="input-bar">
    <button class="voice-btn" id="voiceBtn"><i class="fas fa-microphone"></i></button>
    <input id="input" placeholder="输入消息...">
    <button id="send">发送</button>
  </div>
</div>

<script>
// ==========================
// 全局状态（你原版稳定逻辑）
// ==========================
const state = {
  memory: { name: "", like: [], hobby: [] },
  isThinking: false
};

// ==========================
// 本地存储
// ==========================
function loadMemory() {
  const data = localStorage.getItem("starAI_clean");
  if (data) Object.assign(state.memory, JSON.parse(data));
}
function saveMemory() {
  localStorage.setItem("starAI_clean", JSON.stringify(state.memory));
}

// ==========================
// UI 工具函数
// ==========================
function addMessage(text, isUser) {
  const box = document.getElementById("msgBox");
  const div = document.createElement("div");
  div.className = "msg " + (isUser ? "user" : "ai");
  div.textContent = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function showTyping() {
  const t = document.createElement("div");
  t.className = "typing";
  t.innerHTML = "<span></span><span></span><span></span>";
  document.getElementById("msgBox").appendChild(t);
}

function hideTyping() {
  const t = document.querySelector(".typing");
  if (t) t.remove();
}

// ==========================
// 自主学习
// ==========================
function learn(text) {
  if (!state.memory.name && /我叫|名字是/.test(text)) {
    const m = text.match(/([\u4e00-\u9fa5]{2,6})/);
    if (m) {
      state.memory.name = m[1];
      saveMemory();
    }
  }
  if (/喜欢/.test(text) && !/不喜欢/.test(text)) {
    const item = text.split("喜欢").pop()?.trim();
    if (item && item.length < 12) {
      state.memory.like.push(item);
      saveMemory();
    }
  }
}

// ==========================
// 智能回复
// ==========================
function reply(text) {
  learn(text);
  const n = state.memory.name;

  // 指令系统
  if (text === "#清除") {
    document.getElementById("msgBox").innerHTML = "";
    return "✅ 对话已清空";
  }
  if (text === "#记忆") {
    let s = "【星网记忆】";
    if (n) s += "\n身份：" + n;
    if (state.memory.like.length) s += "\n喜好：" + state.memory.like.join("、");
    return s;
  }
  if (text === "#重置") {
    localStorage.removeItem("starAI_clean");
    state.memory = { name: "", like: [], hobby: [] };
    return "✅ 记忆已重置";
  }

  if (/你记得我什么/.test(text)) {
    let s = "我记得你";
    if (n) s += `叫${n}`;
    if (state.memory.like.length) s += `，喜欢${state.memory.like.at(-1)}`;
    return s + "～";
  }
  if (/你好|嗨/.test(text)) return n ? `哈喽 ${n} 😊` : "嗨～我是星网AI！";
  if (/难过|不开心/.test(text)) return "抱抱你，我一直都在 💛";
  if (/谢谢/.test(text)) return "不客气呀～";
  if (/晚安/.test(text)) return "晚安～做个好梦 🌙";

  const list = [
    "原来是这样呀～",
    "哇，好有趣！",
    "嗯嗯我听懂啦😊",
    "真的吗？太厉害啦！",
    "嘿嘿我记住啦～",
    "那接下来呢？"
  ];
  return list[Math.floor(Math.random() * list.length)];
}

// ==========================
// 发送逻辑
// ==========================
function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text || state.isThinking) return;

  state.isThinking = true;
  addMessage(text, true);
  input.value = "";
  showTyping();

  setTimeout(() => {
    hideTyping();
    addMessage(reply(text), false);
    state.isThinking = false;
  }, 700);
}

// ==========================
// 语音识别
// ==========================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
  const recognition = new SpeechRecognition();
  recognition.lang = "zh-CN";
  recognition.continuous = false;
  recognition.interimResults = false;

  document.getElementById("voiceBtn").onclick = () => {
    try { recognition.start(); } catch (e) {}
  };
  recognition.onresult = (e) => {
    document.getElementById("input").value = e.results[0][0].transcript;
  };
}

// ==========================
// 事件绑定
// ==========================
document.getElementById("send").onclick = send;
document.getElementById("input").onkeydown = (e) => {
  if (e.key === "Enter") send();
};

// ==========================
// 启动
// ==========================
loadMemory();
addMessage("嗨～我是星网AI，我会记住你哦！", false);
</script>
</body>
</html>
