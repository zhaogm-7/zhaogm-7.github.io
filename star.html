<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>星网AI · 升级版</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
    body{height:100vh;overflow:hidden;background:#050818;position:relative}
    .bg-gradient{position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(circle at 50% 50%, #101a36, #050818);z-index:-3;}
    .stars{position:fixed;top:0;left:0;right:0;bottom:0;background-image:radial-gradient(2px 2px at 20px 30px, #fff, transparent),radial-gradient(2px 2px at 60px 70px, #fff, transparent),radial-gradient(1px 1px at 50px 50px, #89b4ff, transparent),radial-gradient(2px 2px at 140px 130px, #9ecaff, transparent),radial-gradient(2px 2px at 180px 180px, #fff, transparent);background-size:200px 200px;animation:bgMove 10s linear infinite;z-index:-2;opacity:0.6;}
    @keyframes bgMove{0%{transform:translateY(0)}100%{transform:translateY(-20px)}}
    .tech-line{position:fixed;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,#58a6ff,transparent);z-index:-1;opacity:0.3;}
    .line1{top:20%;animation:glow 4s infinite}
    .line2{top:80%;animation:glow 5s infinite reverse}
    @keyframes glow{0%,100%{opacity:0.2}50%{opacity:0.5}}
    .chat{width:100%;max-width:800px;height:95vh;background:rgba(22,28,40,0.85);backdrop-filter:blur(10px);border-radius:24px;display:flex;flex-direction:column;overflow:hidden;border:1px solid rgba(88,166,255,0.2);box-shadow:0 0 40px rgba(88,166,255,0.15);position:relative;z-index:10;margin:0 auto;}
    .header{padding:18px 20px;background:rgba(13,17,31,0.9);border-bottom:1px solid rgba(88,166,255,0.15);display:flex;align-items:center;gap:12px}
    .moon-icon{width:24px;height:24px;color:#58a6ff;display:flex;align-items:center;justify-content:center}
    .header h1{font-size:18px;font-weight:600;color:white}
    .badge{background:#238636;color:white;padding:4px 10px;border-radius:40px;font-size:12px}
    .msg-box{flex:1;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:14px;background:transparent}
    .msg{max-width:80%;padding:12px 16px;border-radius:16px;line-height:1.5;opacity:0;transform:translateY(6px);animation:msgIn 0.25s forwards}
    @keyframes msgIn{to{opacity:1;transform:translateY(0)}}
    .user{align-self:flex-end;background:#58a6ff;color:white}
    .ai{align-self:flex-start;background:rgba(33,40,56,0.9);color:#e2e8f0}
    /* 正在输入动画 */
    .typing-indicator{display:flex;gap:5px;padding:12px 16px;background:rgba(33,40,56,0.9);border-radius:16px;align-self:flex-start;width:fit-content;}
    .typing-dot{width:8px;height:8px;border-radius:50%;background:#58a6ff;animation:jump 1.2s infinite}
    .typing-dot:nth-child(2){animation-delay:0.2s}
    .typing-dot:nth-child(3){animation-delay:0.4s}
    @keyframes jump{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    .voice-wrapper{position:relative;width:50px;height:50px;display:flex;align-items:center;justify-content:center}
    .voice-btn{width:50px;height:50px;border-radius:50%;background:rgba(33,40,56,0.9);color:#58a6ff;border:none;font-size:18px;cursor:pointer;z-index:2;transition:all 0.2s}
    .voice-btn:hover{background:rgba(50,60,80,0.9)}
    .voice-btn.active{color:white;background:#0969da}
    .wave{position:absolute;bottom:0;left:50%;transform:translateX(-50%);display:flex;align-items:flex-end;gap:2px;width:32px;height:22px;z-index:1}
    .wave span{width:3px;background:#58a6ff;border-radius:2px;opacity:0}
    .voice-btn.active ~ .wave span{animation:wave 0.35s infinite alternate ease-in-out}
    .wave span:nth-child(1){animation-delay:0s}
    .wave span:nth-child(2){animation-delay:0.1s}
    .wave span:nth-child(3){animation-delay:0.2s}
    .wave span:nth-child(4){animation-delay:0.3s}
    .wave span:nth-child(5){animation-delay:0.4s}
    @keyframes wave{0%{height:4px;opacity:0.3}100%{height:22px;opacity:1}}
    .input-area{display:flex;padding:14px;gap:10px;border-top:1px solid rgba(88,166,255,0.15);background:rgba(13,17,31,0.9)}
    #input{flex:1;padding:14px 16px;border-radius:16px;border:none;background:rgba(33,40,56,0.9);color:white;outline:none;font-size:15px}
    #send{padding:14px 20px;border-radius:16px;background:#58a6ff;color:white;border:none;font-weight:500;cursor:pointer}
    .msg-box::-webkit-scrollbar{width:6px}
    .msg-box::-webkit-scrollbar-thumb{background:rgba(88,166,255,0.3);border-radius:3px}
  </style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="stars"></div>
<div class="tech-line line1"></div>
<div class="tech-line line2"></div>

<div class="chat">
  <div class="header">
    <div class="moon-icon"><i class="fas fa-moon"></i></div>
    <h1>星网AI</h1>
    <span class="badge">升级版 v2.0</span>
  </div>
  <div class="msg-box" id="msgBox"></div>
  <div class="input-area">
    <div class="voice-wrapper">
      <button class="voice-btn" id="voice-btn"><i class="fas fa-microphone"></i></button>
      <div class="wave"><span></span><span></span><span></span><span></span><span></span></div>
    </div>
    <input id="input" placeholder="输入消息..." autocomplete="off">
    <button id="send">发送</button>
  </div>
</div>

<script>
(function(){
  "use strict";
  const msgBox = document.getElementById('msgBox');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const voiceBtn = document.getElementById('voice-btn');

  // ---------- 状态管理 ----------
  let memory = { name: "", history: [] };   // 历史记录为字符串数组
  let isTyping = false;          // 是否正在等待AI回复
  let isSpeaking = false;        // 是否正在语音播报
  let silentTimer = null;        // 沉默问候计时器
  let typingIndicator = null;    // “正在输入”DOM元素
  let typewriterTimer = null;    // 打字机计时器

  // ---------- 本地存储 ----------
  function loadMemory(){
    try{
      const saved = localStorage.getItem('starAI_upgrade');
      if(saved){
        const data = JSON.parse(saved);
        memory.name = data.name || "";
        memory.history = data.history || [];
      }
    }catch(e){}
  }
  function saveMemory(){
    try{
      localStorage.setItem('starAI_upgrade', JSON.stringify({
        name: memory.name,
        history: memory.history.slice(-20) // 最多保存20条
      }));
    }catch(e){}
  }
  loadMemory();

  // ---------- 语音合成 ----------
  const synth = window.speechSynthesis;
  let voices = [];
  function loadVoices(){ voices = synth.getVoices(); }
  loadVoices();
  if(synth.onvoiceschanged) synth.onvoiceschanged = loadVoices;

  function speak(text){
    if(!synth) return;
    synth.cancel(); // 打断当前语音
    isSpeaking = true;
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = 1.1;
    utterance.pitch = 1.5;
    const zhVoice = voices.find(v => v.lang.startsWith('zh'));
    if(zhVoice) utterance.voice = zhVoice;
    utterance.onend = () => { isSpeaking = false; resetSilentTimer(); };
    utterance.onerror = () => { isSpeaking = false; resetSilentTimer(); };
    synth.speak(utterance);
  }

  // ---------- 沉默问候 ----------
  function clearSilentTimer(){
    if(silentTimer) clearTimeout(silentTimer);
    silentTimer = null;
  }
  function resetSilentTimer(){
    clearSilentTimer();
    if(isSpeaking || isTyping || input.value.trim()) return;
    silentTimer = setTimeout(() => {
      const msg = memory.name ? `${memory.name}，在干嘛呀～` : '你在吗？陪我聊天吧～';
      addAIMessage(msg);
      speak(msg);
    }, 12000);
  }

  // ---------- UI 辅助：正在输入动画 ----------
  function showTypingIndicator(){
    if(typingIndicator) return;
    const div = document.createElement('div');
    div.className = 'typing-indicator';
    div.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
    msgBox.appendChild(div);
    typingIndicator = div;
    msgBox.scrollTop = msgBox.scrollHeight;
  }
  function hideTypingIndicator(){
    if(typingIndicator){
      typingIndicator.remove();
      typingIndicator = null;
    }
  }

  // 打字机效果显示AI消息
  function typewriterEffect(element, text, speed = 30, callback){
    let i = 0;
    element.textContent = '';
    const timer = setInterval(() => {
      if(i < text.length){
        element.textContent += text.charAt(i);
        i++;
        msgBox.scrollTop = msgBox.scrollHeight;
      } else {
        clearInterval(timer);
        if(callback) callback();
      }
    }, speed);
    return timer;
  }

  // 添加用户消息
  function addUserMessage(text){
    const div = document.createElement('div');
    div.classList.add('msg', 'user');
    div.textContent = text;
    msgBox.appendChild(div);
    msgBox.scrollTop = msgBox.scrollHeight;
    // 保存到历史
    memory.history.push(`用户: ${text}`);
    saveMemory();
  }

  // 添加AI消息（带打字机效果和语音）
  function addAIMessage(text){
    hideTypingIndicator();
    const div = document.createElement('div');
    div.classList.add('msg', 'ai');
    msgBox.appendChild(div);
    typewriterTimer = typewriterEffect(div, text, 35, () => {
      // 打字结束后播报语音
      speak(text);
      // 保存到历史
      memory.history.push(`AI: ${text}`);
      saveMemory();
      isTyping = false;
      resetSilentTimer();
    });
  }

  // ---------- 本地智能回复（可替换为大模型API） ----------
  function generateReply(userText){
    const t = userText.trim();
    // 学习名字
    if(!memory.name && /我叫|名字是/.test(t)){
      const match = t.match(/[\u4e00-\u9fa5]{2,6}/);
      if(match){
        memory.name = match[0];
        saveMemory();
        return `好耶！我记住你啦，${memory.name} 😊`;
      }
    }
    // 情绪识别
    if(/难过|伤心|不开心|烦/.test(t)) return '抱抱你～我一直都在这里陪着你 💛';
    if(/开心|高兴|快乐/.test(t)) return memory.name ? `看到${memory.name}开心，我也好快乐！` : '太棒啦！看到你开心我也超开心 😁';
    // 基础问答
    if(/你好|嗨|哈喽/.test(t)) return memory.name ? `哈喽 ${memory.name}～今天过得怎么样？` : '嗨～你好呀！你叫什么名字？';
    if(/你是谁/.test(t)) return '我是永远8岁的星网AI，最喜欢陪你聊天啦～';
    if(/谢谢|谢谢你/.test(t)) return '不客气呀～能帮到你我超幸福！';
    if(/晚安/.test(t)) return '晚安～做个甜甜的梦 🌙';
    if(/吃饭|饿/.test(t)) return '我不用吃饭，但你可以多吃点好吃的～';
    if(/天气/.test(t)) return '我这边永远是星空万里 ✨ 你那边呢？';
    // 简单上下文：如果历史中有名字相关
    const lastAI = memory.history.filter(h => h.startsWith('AI:')).pop();
    if(lastAI && lastAI.includes('名字') && !memory.name){
      return '你还没告诉我你的名字呢～';
    }
    // 默认回复
    const defaults = [
      '原来是这样呀～那接下来呢？',
      '哇，好有意思！再多说一点好不好？',
      '嗯嗯我听懂啦，你还想聊什么？',
      '真的吗？太有趣啦！',
      '我记住啦，你继续说～',
      '嘿嘿，和你聊天真开心 ✨'
    ];
    return defaults[Math.floor(Math.random() * defaults.length)];
  }

  // ---------- 发送消息流程 ----------
  function handleSend(){
    const text = input.value.trim();
    if(!text || isTyping) return;

    // 打断语音
    if(isSpeaking){ synth.cancel(); isSpeaking = false; }
    clearSilentTimer();

    addUserMessage(text);
    input.value = '';
    isTyping = true;
    showTypingIndicator();

    // 模拟思考延迟
    setTimeout(() => {
      const reply = generateReply(text);
      addAIMessage(reply);
    }, 600);
  }

  // ---------- 语音识别（可选） ----------
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;
  let isRecording = false;
  if(SpeechRecognition){
    recognition = new SpeechRecognition();
    recognition.lang = 'zh-CN';
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.onstart = () => { isRecording = true; voiceBtn.classList.add('active'); };
    recognition.onend = () => { isRecording = false; voiceBtn.classList.remove('active'); };
    recognition.onerror = (e) => {
      isRecording = false; voiceBtn.classList.remove('active');
      alert('语音识别失败: ' + e.error);
    };
    recognition.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      input.value = transcript;
      input.focus();
    };
  }

  function toggleVoiceInput(){
    if(!recognition){
      alert('当前浏览器不支持语音识别，请使用 Chrome 或 Edge');
      return;
    }
    try{
      if(isRecording){
        recognition.stop();
      } else {
        recognition.start();
      }
    }catch(e){ alert('语音启动失败'); }
  }

  // ---------- 初始化 ----------
  function welcome(){
    let welcomeMsg = memory.name ? `欢迎回来，${memory.name}！今天想聊什么？` : '嗨～我是星网AI，我们来聊天吧！';
    // 如果历史为空才显示欢迎语
    if(memory.history.length === 0){
      addAIMessage(welcomeMsg);
    } else {
      // 恢复最近一条AI消息显示在界面上（可选，此处简单处理）
      const lastMsg = memory.history[memory.history.length-1];
      if(lastMsg && lastMsg.startsWith('AI:')){
        // 不重复显示，只显示欢迎
        addAIMessage(welcomeMsg);
      }
    }
    resetSilentTimer();
  }

  setTimeout(() => { welcome(); loadVoices(); }, 300);

  // ---------- 事件绑定 ----------
  sendBtn.onclick = handleSend;
  voiceBtn.onclick = toggleVoiceInput;
  input.onkeydown = (e) => { if(e.key === 'Enter') handleSend(); };
  input.addEventListener('input', resetSilentTimer);

  // 清理
  window.addEventListener('beforeunload', () => {
    clearSilentTimer();
    if(typewriterTimer) clearInterval(typewriterTimer);
    if(synth.speaking) synth.cancel();
  });

})();
</script>
</body>
</html>
