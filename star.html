<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>星网AI - 深空终端 · 进化</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Roboto, system-ui, -apple-system;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: #050a1a;
      color: #e0f7ff;
    }

    /* 启动动画 */
    .boot {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #050a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 9999;
      color: #5ad1ff;
      font-size: 16px;
      gap: 10px;
      animation: bootHide 0.6s ease forwards 1.6s;
    }
    @keyframes bootHide {
      to { opacity: 0; visibility: hidden; }
    }
    .boot-text {
      opacity: 0;
      animation: textShow 0.6s ease forwards;
    }
    .boot-text:nth-child(1) { animation-delay: 0.1s; }
    .boot-text:nth-child(2) { animation-delay: 0.6s; }
    .boot-text:nth-child(3) { animation-delay: 1.1s; }
    @keyframes textShow {
      to { opacity: 1; }
    }

    /* 深空背景 */
    .space-bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top center, #0c1a36, #050a1a);
      z-index: -3;
    }

    /* 流动星空 */
    .stars {
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1.5px 1.5px at 20% 30%, #c0f8ff, transparent),
        radial-gradient(1.5px 1.5px at 60% 70%, #9ceeff, transparent),
        radial-gradient(1px 1px at 50% 50%, #5ad1ff, transparent),
        radial-gradient(2px 2px at 10% 10%, #70a0ff, transparent);
      background-size: 220px 220px;
      opacity: 0.6;
      z-index: -2;
      animation: starMove 15s linear infinite;
    }

    @keyframes starMove {
      0% { transform: translateY(0); }
      100% { transform: translateY(-220px); }
    }

    /* 主窗口 */
    .star-window {
      width: 100%;
      max-width: 820px;
      height: 95vh;
      margin: 2.5vh auto;
      background: rgba(12, 22, 44, 0.85);
      border-radius: 18px;
      border: 1px solid rgba(90, 209, 255, 0.22);
      box-shadow: 0 0 50px rgba(90, 209, 255, 0.12);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      z-index: 10;
    }

    /* 头部 */
    .star-header {
      padding: 18px 22px;
      background: rgba(9, 16, 32, 0.96);
      border-bottom: 1px solid rgba(90, 209, 255, 0.18);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .star-header i {
      color: #5ad1ff;
      font-size: 20px;
    }

    .star-header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #e0f7ff;
    }

    /* 右上角系统状态 */
    .status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #a0c8ff;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      background: #5ad1ff;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100%{opacity:.4;}50%{opacity:1;}
    }

    /* 消息区域 */
    .msg-box {
      flex: 1;
      padding: 22px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .msg {
      max-width: 76%;
      padding: 12px 16px;
      border-radius: 13px;
      font-size: 15px;
      line-height: 1.5;
      opacity: 0;
      transform: translateY(6px);
      animation: msgIn 0.25s forwards;
    }

    @keyframes msgIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      align-self: flex-end;
      background: linear-gradient(90deg, #2d7dff, #5ad1ff);
      color: #fff;
      border-bottom-right-radius: 5px;
    }

    .msg.ai {
      align-self: flex-start;
      background: rgba(18, 30, 54, 0.7);
      color: #e0f7ff;
      border: 1px solid rgba(90, 209, 255, 0.18);
      border-bottom-left-radius: 5px;
    }

    /* 正在输入 */
    .typing {
      display: flex;
      gap: 6px;
      padding: 11px 15px;
      background: rgba(18, 30, 54, 0.7);
      border-radius: 13px;
      align-self: flex-start;
      border: 1px solid rgba(90, 209, 255, 0.18);
    }

    .typing span {
      width: 7px;
      height: 7px;
      background: #5ad1ff;
      border-radius: 50%;
      animation: jump 1.2s infinite ease-in-out;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes jump {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    /* 发送框 */
    .input-bar {
      display: flex;
      gap: 10px;
      padding: 16px;
      background: transparent !important;
      border-top: 1px solid rgba(90, 209, 255, 0.15);
    }

    .voice-btn {
      width: 50px;
      height: 50px;
      border-radius: 13px;
      background: rgba(18, 30, 54, 0.35);
      border: 1px solid rgba(90, 209, 255, 0.3);
      color: #5ad1ff;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
    }

    .voice-btn.active {
      background: #2d7dff;
      color: white;
    }

    .voice-btn:hover {
      background: rgba(90, 209, 255, 0.1);
    }

    #input {
      flex: 1;
      padding: 14px 18px;
      border-radius: 13px;
      border: 1px solid rgba(90, 209, 255, 0.3);
      background: rgba(15, 26, 48, 0.35);
      color: #e0f7ff;
      font-size: 15px;
      outline: none;
      transition: 0.2s;
    }

    #input:focus {
      border-color: rgba(90, 209, 255, 0.6);
      background: rgba(15, 26, 48, 0.45);
    }

    #send {
      padding: 14px 24px;
      border-radius: 13px;
      background: linear-gradient(90deg, #2d7dff, #5ad1ff);
      color: #fff;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    #send:hover {
      opacity: 0.92;
    }

    /* 滚动条 */
    .msg-box::-webkit-scrollbar {
      width: 6px;
    }

    .msg-box::-webkit-scrollbar-thumb {
      background: rgba(90, 209, 255, 0.25);
      border-radius: 3px;
    }
  </style>
</head>
<body>

<!-- 启动动画 -->
<div class="boot">
  <div class="boot-text">星网系统启动中…</div>
  <div class="boot-text">神经链路同步…</div>
  <div class="boot-text">连接成功</div>
</div>

<div class="space-bg"></div>
<div class="stars"></div>

<div class="star-window">
  <div class="star-header">
    <i class="fas fa-satellite"></i>
    <h1>星网AI 深空终端</h1>
    <div class="status">
      <div class="status-dot"></div>
      <span id="statusText">神经连接在线</span>
    </div>
  </div>

  <div class="msg-box" id="msgBox"></div>

  <div class="input-bar">
    <button class="voice-btn" id="voiceBtn"><i class="fas fa-microphone"></i></button>
    <input id="input" placeholder="输入消息... 支持 #帮助" autocomplete="off">
    <button id="send">发送</button>
  </div>
</div>

<script>
(function(){
  "use strict";

  const MODEL_CONFIG = {
    endpoint: "",
    apiKey: "",
    modelName: "deepseek-chat",
    systemPrompt: "你是星网AI，一个来自深空的智慧终端。说话温柔、简短、温暖，像朋友一样。"
  };

  const msgBox = document.getElementById('msgBox');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const voiceBtn = document.getElementById('voiceBtn');
  const statusText = document.getElementById('statusText');

  let memory = { name: "", likes: [], history: [] };
  let isThinking = false;
  let isSpeaking = false;
  let typingIndicator = null;
  let typewriterTimer = null;

  const synth = window.speechSynthesis;
  let voices = [];
  function loadVoices() { voices = synth.getVoices(); }
  loadVoices();
  synth.onvoiceschanged = loadVoices;

  // 本地存储
  function loadMemory() {
    try {
      const d = localStorage.getItem('starAI_evolved');
      if(d) Object.assign(memory, JSON.parse(d));
    } catch(e){}
  }
  function saveMemory() {
    try {
      localStorage.setItem('starAI_evolved', JSON.stringify({
        name: memory.name, likes: memory.likes, history: memory.history.slice(-40)
      }));
    } catch(e){}
  }

  // 语音
  function speak(text) {
    if(!synth) return;
    synth.cancel();
    isSpeaking = true;
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 1.1; u.pitch = 1.4;
    const v = voices.find(i=>i.lang.startsWith('zh'));
    if(v) u.voice = v;
    u.onend = u.onerror = ()=>{ isSpeaking = false; };
    synth.speak(u);
  }

  // UI
  function showTyping() {
    if(typingIndicator) return;
    const d = document.createElement('div');
    d.className = 'typing';
    d.innerHTML = '<span></span><span></span><span></span>';
    msgBox.appendChild(d);
    typingIndicator = d;
    msgBox.scrollTop = msgBox.scrollHeight;
  }
  function hideTyping() {
    if(typingIndicator) { typingIndicator.remove(); typingIndicator = null; }
  }

  // 打字机
  function typewriter(el, txt, sp=35, cb) {
    let i=0;
    el.textContent = '';
    const t = setInterval(()=>{
      if(i<txt.length){
        el.textContent += txt[i++];
        msgBox.scrollTop = msgBox.scrollHeight;
      } else {
        clearInterval(t);
        cb?.();
      }
    }, sp);
    return t;
  }

  // 消息
  function addUser(text) {
    const d = document.createElement('div');
    d.className = 'msg user';
    d.textContent = text;
    msgBox.appendChild(d);
    msgBox.scrollTop = msgBox.scrollHeight;
    memory.history.push({role:'user',content:text});
    saveMemory();
  }
  function addAI(text) {
    hideTyping();
    const d = document.createElement('div');
    d.className = 'msg ai';
    msgBox.appendChild(d);
    typewriterTimer = typewriter(d, text, 35, ()=>{
      speak(text);
      memory.history.push({role:'assistant',content:text});
      saveMemory();
      isThinking = false;
      statusText.textContent = '神经连接在线';
    });
  }

  // 本地回复
  function localReply(t) {
    if(t==='#清除'){ msgBox.innerHTML=''; return '✅ 对话已清空'; }
    if(t==='#记忆'){
      let s='【星网记忆】';
      if(memory.name)s+=`\n身份：${memory.name}`;
      if(memory.likes.length)s+=`\n喜好：${memory.likes.join('、')}`;
      return s;
    }
    if(t==='#重置'){ localStorage.removeItem('starAI_evolved'); memory={name:"",likes:[],history:[]}; return '✅ 记忆已重置'; }
    if(t==='#帮助') return '📡 #清除 #记忆 #重置 #模型';
    if(t==='#模型') return MODEL_CONFIG.endpoint?`🧠 大模型：${MODEL_CONFIG.modelName}`:'🧠 星网本地智能';

    if(!memory.name && /我叫|名字是/.test(t)){
      const m = t.match(/[\u4e00-\u9fa5]{2,6}/);
      if(m){ memory.name=m[0]; saveMemory(); return `我记住你啦，${memory.name} 😊`; }
    }
    if(/喜欢/.test(t)&&!/不喜欢/.test(t)){
      const it = t.split('喜欢').pop()?.trim();
      if(it&&it.length<12&&!memory.likes.includes(it)){ memory.likes.push(it); saveMemory(); }
    }

    if(/你记得我/.test(t)){
      let s='我记得你';
      if(memory.name)s+=`叫${memory.name}`;
      if(memory.likes.length)s+=`，喜欢${memory.likes.slice(-1)}`;
      return s+'～';
    }
    if(/你好|嗨/.test(t))return memory.name?`哈喽 ${memory.name} 😊`:'嗨～我是星网AI！';
    if(/难过|不开心/.test(t))return '抱抱你，我一直都在 💛';
    if(/谢谢/.test(t))return '不客气呀～';
    if(/晚安/.test(t))return '晚安～做个好梦 🌙';

    const arr=['原来是这样呀～','哇，好有趣！','嗯嗯我听懂啦😊','真的吗？太厉害啦！','嘿嘿我记住啦～','那接下来呢？'];
    return arr[Math.floor(Math.random()*arr.length)];
  }

  // LLM
  async function getAI(text) {
    if(!MODEL_CONFIG.endpoint) return localReply(text);
    try {
      const ctrl = new AbortController();
      const to = setTimeout(()=>ctrl.abort(),10000);
      const res = await fetch(MODEL_CONFIG.endpoint,{
        method:'POST',
        headers:{'Content-Type':'application/json',Authorization:MODEL_CONFIG.apiKey?`Bearer ${MODEL_CONFIG.apiKey}`:''},
        body:JSON.stringify({
          model:MODEL_CONFIG.modelName,
          messages:[{role:'system',content:MODEL_CONFIG.systemPrompt},...memory.history.slice(-10)],
          temperature:0.8,max_tokens:250
        }),
        signal:ctrl.signal
      });
      clearTimeout(to);
      if(!res.ok)throw new Error('err');
      const d=await res.json();
      return d.choices?.[0]?.message?.content || localReply(text);
    } catch(e){
      statusText.textContent = '本地智能模式';
      return localReply(text);
    }
  }

  // 发送
  async function send() {
    const t = input.value.trim();
    if(!t||isThinking)return;
    if(isSpeaking&&synth)synth.cancel();
    isThinking = true;
    statusText.textContent = '思考中...';
    addUser(t);
    input.value = '';
    showTyping();
    try {
      const r = await getAI(t);
      addAI(r);
    } catch(e){
      hideTyping();
      addAI('星网信号波动，请再试一次 🌌');
    }
  }

  // 语音识别
  let rec = null;
  let recording = false;
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  if(SR){
    rec = new SR();
    rec.lang='zh-CN';
    rec.continuous=rec.interimResults=false;
    rec.onstart=()=>{ recording=true; voiceBtn.classList.add('active'); };
    rec.onend=()=>{ recording=false; voiceBtn.classList.remove('active'); };
    rec.onerror=()=>{ recording=false; voiceBtn.classList.remove('active'); };
    rec.onresult=(e)=>{ input.value=e.results[0][0].transcript; input.focus(); };
  }
  function toggleVoice(){
    if(!rec){alert('不支持语音');return;}
    try{ recording?rec.stop():rec.start(); }catch(e){}
  }

  // 欢迎
  function welcome(){
    const txt = memory.name?`欢迎回来，${memory.name}！✨`:'嗨～我是星网AI，输入 #帮助 查看指令～';
    if(memory.history.length===0){
      addAI(txt);
    } else {
      const last = memory.history.filter(i=>i.role==='assistant').pop();
      if(last){
        const d=document.createElement('div');
        d.className='msg ai';
        d.textContent=last.content;
        msgBox.appendChild(d);
      }
      addAI(txt);
    }
  }

  // 启动
  loadMemory();
  setTimeout(()=>{ welcome(); }, 1800);

  // 事件
  sendBtn.onclick = send;
  voiceBtn.onclick = toggleVoice;
  input.onkeydown = e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); } };

  // 清理
  window.addEventListener('beforeunload',()=>{
    if(typewriterTimer)clearInterval(typewriterTimer);
    if(synth?.speaking)synth.cancel();
  });

})();
</script>
</body>
</html>
