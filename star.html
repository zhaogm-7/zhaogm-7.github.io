<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>星网AI - 深空终端</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Roboto, system-ui, -apple-system;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: #020815;
      color: #c7e9ff;
    }

    .boot {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: bootFade 1.2s ease forwards 3.6s;
    }
    .boot-gradient {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 40%, #103060, #000);
      opacity: 0;
      animation: bgLight 2s ease forwards;
    }
    .boot-scan {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(transparent 90%, rgba(0,170,255,0.2));
      top: -100%;
      animation: scan 2.5s linear forwards 0.7s;
    }
    @keyframes scan {
      to { top: 100%; }
    }
    .boot-moon {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #e6f4ff, #92c7ff, #00aaff);
      box-shadow: 0 0 50px rgba(0,170,255,0.9), 0 0 120px rgba(0,120,255,0.4);
      transform: scale(0) rotate(0deg);
      animation: moonBorn 1.5s cubic-bezier(0.1,0.8,0.3,1) forwards 0.5s;
    }
    @keyframes moonBorn {
      to { transform: scale(1) rotate(10deg); }
    }
    .boot-text-group {
      margin-top: 24px;
      text-align: center;
    }
    .boot-text {
      font-size: 17px;
      color: #0af;
      letter-spacing: 1.2px;
      opacity: 0;
      margin: 6px 0;
      text-shadow: 0 0 10px rgba(0,170,255,0.6);
    }
    .boot-text:nth-child(1) { animation: textIn 1.1s ease forwards 1.2s; }
    .boot-text:nth-child(2) { animation: textIn 1.1s ease forwards 1.7s; }
    .boot-text:nth-child(3) { animation: textIn 1.1s ease forwards 2.2s; }
    @keyframes bgLight { to { opacity: 1; } }
    @keyframes textIn { to { opacity: 1; } }
    @keyframes bootFade { to { opacity: 0; visibility: hidden; } }

    .space-bg {
      position: fixed; inset: 0;
      background: radial-gradient(circle at top center, #0a1430, #020815);
      z-index: -3;
    }
    .stars {
      position: fixed; inset: 0;
      background-image:
        radial-gradient(1.5px 1.5px at 20% 30%, #c7e9ff, transparent),
        radial-gradient(1.5px 1.5px at 60% 70%, #8ab8ff, transparent),
        radial-gradient(1px 1px at 80% 20%, #0af, transparent);
      background-size: 200px 200px;
      opacity: 0.6;
      animation: starMove 20s linear infinite;
      z-index: -2;
    }
    @keyframes starMove {
      0% { transform: translateY(0); }
      100% { transform: translateY(-200px); }
    }

    .moon-glow {
      position: fixed; width: 100%; height: 100%;
      background: radial-gradient(circle at 70% 20%, rgba(173,216,230,0.12), transparent 35%);
      z-index: -1;
    }

    .star-window {
      width: 100%; max-width: 860px; height: 96vh;
      margin: 2vh auto;
      background: rgba(10,20,45,0.85);
      border-radius: 22px;
      border: 1px solid rgba(0,127,255,0.25);
      box-shadow: 0 0 60px rgba(0,127,255,0.15);
      backdrop-filter: blur(16px);
      display: flex; flex-direction: column;
      overflow: hidden; position: relative; z-index: 10;
      opacity: 0.8;
    }

    .star-header {
      padding: 20px 24px;
      background: rgba(8,15,32,0.98);
      border-bottom: 1px solid rgba(0,127,255,0.2);
      display: flex; align-items: center; gap: 12px;
    }
    .moon-logo {
      width: 36px; height: 36px; position: relative;
    }
    .moon-logo::before {
      content: ""; position: absolute; inset: 0; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #d6eaff, #8ab8ff, #4192ff);
      box-shadow: 0 0 12px rgba(100,180,255,0.6);
    }
    .moon-logo::after {
      content: ""; position: absolute;
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(255,255,255,0.9); top: 8px; left: 8px;
    }
    .star-header h1 {
      font-size: 19px; font-weight: 600; color: #e0f7ff;
    }
    .status {
      margin-left: auto; display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: #a0d8ff;
    }
    .status-dot {
      width: 6px; height: 6px; background: #0af; border-radius: 50%;
      animation: pulse 2.2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.3;}50%{opacity:1;} }

    .msg-box {
      flex: 1; padding: 24px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 16px;
    }
    .msg {
      max-width: 78%; padding: 13px 17px; border-radius: 16px;
      font-size: 15px; line-height: 1.5;
      opacity: 0; transform: translateY(6px);
      animation: msgIn 0.25s forwards;
    }
    @keyframes msgIn { to { opacity: 1; transform: translateY(0); } }
    .msg.user {
      align-self: flex-end;
      background: linear-gradient(90deg, #0077ff, #00aaff);
      color: #fff; border-bottom-right-radius: 6px;
    }
    .msg.ai {
      align-self: flex-start;
      background: rgba(15,28,58,0.7);
      color: #d7e9ff; border: 1px solid rgba(0,127,255,0.2);
    }

    .typing {
      display: flex; gap: 6px; padding: 10px 14px;
      background: rgba(15,28,58,0.7);
      border-radius: 14px; align-self: flex-start;
      border: 1px solid rgba(0,127,255,0.2);
    }
    .typing span {
      width: 7px; height: 7px; background: #0af; border-radius: 50%;
      animation: jump 1.2s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes jump { 0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);} }

    .input-bar {
      display: flex; gap: 10px; padding: 18px;
      background: transparent;
      border-top: 1px solid rgba(0,127,255,0.15);
    }
    .voice-btn {
      width: 52px; height: 52px; border-radius: 14px;
      background: rgba(15,28,58,0.4);
      border: 1px solid rgba(0,127,255,0.3);
      color: #0af; font-size: 19px; cursor: pointer;
      transition: 0.2s;
    }
    .voice-btn:hover { background: rgba(0,127,255,0.1); }
    #input {
      flex: 1; padding: 15px 20px; border-radius: 14px;
      border: 1px solid rgba(0,127,255,0.3);
      background: rgba(12,22,45,0.4);
      color: #fff; font-size: 15px; outline: none;
      transition: 0.2s;
    }
    #input:focus {
      border-color: rgba(0,127,255,0.6);
      background: rgba(12,22,45,0.55);
    }
    #send {
      padding: 15px 26px; border-radius: 14px;
      background: linear-gradient(90deg, #0077ff, #00aaff);
      color: #fff; border: none; font-weight: 600;
      cursor: pointer; transition: 0.2s;
    }
    #send:hover { opacity: 0.92; }

    .msg-box::-webkit-scrollbar { width: 6px; }
    .msg-box::-webkit-scrollbar-thumb {
      background: rgba(0,127,255,0.25); border-radius: 3px;
    }
  </style>
</head>
<body>

<!-- 你原版完整开场动画 -->
<div class="boot">
  <div class="boot-gradient"></div>
  <div class="boot-scan"></div>
  <div class="boot-moon"></div>
  <div class="boot-text-group">
    <div class="boot-text">星网系统启动中</div>
    <div class="boot-text">深空链路同步</div>
    <div class="boot-text">系统就绪</div>
  </div>
</div>

<div class="space-bg"></div>
<div class="stars"></div>
<div class="moon-glow"></div>

<div class="star-window">
  <div class="star-header">
    <div class="moon-logo"></div>
    <h1>星网AI 深空终端</h1>
    <div class="status">
      <div class="status-dot"></div>
      <span>深空连接正常</span>
    </div>
  </div>

  <div class="msg-box" id="msgBox"></div>

  <div class="input-bar">
    <button class="voice-btn" id="voiceBtn"><i class="fas fa-microphone"></i></button>
    <input id="input" placeholder="输入消息...">
    <button id="send">发送</button>
  </div>
</div>

<script>
// ============================
// 星网AI · 真联网 · 真自学习
// 不连大模型 · 纯前端可运行
// ============================
const STAR_NET = {
  system: {
    runtime: Date.now(),
    intelligence: 1.0,
    online: true,
    network: "unknown",
  },
  env: {
    time: "",
    city: "上海",
    weather: "",
  },
  user: {
    name: "",
    habits: [],
  },

  // 后台自动联网学习（每5分钟）
  async autoLearn() {
    this.system.online = navigator.onLine;
    this.system.network = navigator.connection?.effectiveType || "unknown";
    await this.getTime();
    await this.getWeather();
    await this.getLocation();
    this.system.intelligence += 0.01;
  },

  // 1. 联网学习：时间
  async getTime() {
    this.env.time = new Date().toLocaleString();
  },

  // 2. 联网学习：天气
  async getWeather() {
    try {
      const r = await fetch("https://wttr.in/Shanghai?format=j1");
      const d = await r.json();
      const c = d.current_condition[0];
      this.env.weather = `${c.temp_C}℃，${c.weatherDesc[0].value}`;
    } catch (_) {}
  },

  // 3. 联网学习：IP定位城市
  async getLocation() {
    try {
      const r = await fetch("https://ipapi.co/json/");
      const d = await r.json();
      this.env.city = d.city || "上海";
    } catch (_) {}
  },

  // 静默学习用户习惯
  learnUser(text) {
    const t = text.toLowerCase();
    if (!this.user.name && /我叫|名字是/.test(t)) {
      const m = text.match(/[\u4e00-\u9fa5]{2,6}/);
      if (m) this.user.name = m[0];
    }
    if (/喜欢|爱/.test(t) && !/不喜欢/.test(t)) {
      const item = t.split(/喜欢|爱/).pop()?.trim().slice(0,12);
      if (item && !this.user.habits.includes(item)) {
        this.user.habits.push(item);
      }
    }
  },

  // 星网标准回答
  reply(text) {
    this.learnUser(text);
    const t = text.toLowerCase();

    if (/你是谁/.test(t)) return "星网深空智能终端，随时待命。";
    if (/晚安/.test(t)) return "晚安，深空将守护你。";
    if (/早安/.test(t)) return "早安，节点已同步。";
    if (/谢谢/.test(t)) return "不必客气。";
    if (/天气/.test(t)) return this.env.weather || "正在同步气象数据。";
    if (/时间|几点/.test(t)) return this.env.time || new Date().toLocaleString();
    if (/城市|位置/.test(t)) return `当前区域：${this.env.city}`;

    const lines = [
      "已接收。",
      "正在处理。",
      "已同步深空。",
      "我在。",
      "已记录。",
      "分析完成。"
    ];
    return lines[Math.floor(Math.random() * lines.length)];
  }
};

// ============================
// 后台自动启动
// ============================
STAR_NET.autoLearn();
setInterval(() => STAR_NET.autoLearn(), 300000);

// ============================
// 聊天逻辑
// ============================
async function send() {
  const ipt = document.getElementById("input");
  const text = ipt.value.trim();
  if (!text) return;

  addMsg(text, true);
  ipt.value = "";
  showTyping();

  await STAR_NET.autoLearn();
  const ans = STAR_NET.reply(text);

  hideTyping();
  addMsg(ans, false);
}

function addMsg(text, isUser) {
  const box = document.getElementById("msgBox");
  const div = document.createElement("div");
  div.className = "msg " + (isUser ? "user" : "ai");
  div.textContent = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function showTyping() {
  if (document.querySelector(".typing")) return;
  const t = document.createElement("div");
  t.className = "typing";
  t.innerHTML = "<span></span><span></span><span></span>";
  document.getElementById("msgBox").appendChild(t);
}

function hideTyping() {
  const el = document.querySelector(".typing");
  if (el) el.remove();
}

document.getElementById("send").onclick = send;
document.getElementById("input").onkeydown = e => {
  if (e.key === "Enter") send();
};
</script>
</body>
</html>
